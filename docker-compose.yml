services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace:cached
    working_dir: /workspace/backend
    environment:
      # Secrets come from Codespaces secrets (already exported into the shell
      # that runs `docker compose up`), substituted here instead of relying on
      # an .env file - which is gitignored and won't exist on a fresh clone.
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_DRIVE_ROOT_FOLDER_ID: ${GOOGLE_DRIVE_ROOT_FOLDER_ID:-}
      GOOGLE_ARCHIVING_MATRIX_FILE_ID: ${GOOGLE_ARCHIVING_MATRIX_FILE_ID:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      EMBEDDING_MODEL: intfloat/multilingual-e5-small
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/contracts
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      REDIS_URL: redis://redis:6379/0
      CONFIDENCE_HIGH: "0.90"
      CONFIDENCE_WARN: "0.70"
      CONFIDENCE_REFUSE: "0.50"
    depends_on:
      - postgres
      - chromadb
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace:cached
    working_dir: /workspace/frontend
    # The repo bind-mount above shadows the image's node_modules with the host's
    # /workspace/frontend (which has none), leaving `next` missing and crashing
    # `npm run dev` -> 502. Install into the mounted volume at startup so the
    # deps persist on the volume and survive container recreation.
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contracts
    volumes:
      - pgdata:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma:0.4.24
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  chromadata:
  redisdata:
